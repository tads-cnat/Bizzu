{% extends "basePerfil.html" %}
{% load static %}


{% block content %}
<link rel="stylesheet" href="{% static 'css/perfilPessoal.css' %}">
    <div class="comunidade-infos">
        <img src="{{ user.imagemPerfil.url }}" alt="imagem da comunidade tads" class="icon">
        <div class="principais-info">
            <h1 class="nomeUsuario"> {{usuario.nome}} </h1> 
            <p class="username">@{{ usuario.username }}</p>
            <p class="descricao">{{ usuario.descricao }}</p>
            <div class="seguindo-bt">
                <p class="paragrafo">{{usuarioseguidores.seguidor.count}} segue</p>
                <p class="paragrafo">{{usuarioseguidores.seguido.count}} seguindo</p>
                <a id="BotaoLink" class="PerfilSecundario" href="#"><p id="botaoP">Seguir</p></a>  
                <!-- <a id="BotaoLink" class="PerfilSecundario" href="#"><p id="botaoP">Deixar de seguir</p></a>  -->
            </div>  
        </div>
    </div>
{% endblock %}
