{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'css/stylecomunidade.css' %}">
    <title>Concluir Cadastro</title>
</head>
<body>
    <section class="concluir-cadastro">
        <header>
            <h3>Agora que tal deixar <br> o seu perfil único?</h3>
        </header>

        <div class="tudo">
            <main class="comunidades">
            
                {% for comunidade in comunidades %}
                    <div class="principais">
                        <img class="primeira" src="{% static 'img/dentro1.png' %}" alt="{{ comunidade.nome }}">
                        <article class="comunidade">
                            <h2>{{ comunidade.nome }}</h2>
                            <p>{{ comunidade.descricao }}</p>
                            <span class="seguindo">{{ comunidade.seguidores.count }} seguindo</span>

                            <form method="POST" action="{% url 'associar_comunidade' %}">
                                {% csrf_token %}
                                <input type="hidden" name="id_comunidade" value="{{ comunidade.id }}">
                                <div class="botao">
                                    <button class="seguir" type="submit">Seguir</button>
                                </div>
                            </form>
                        </article>
                    </div>
                {% empty %}
                    <p>Nenhuma comunidade encontrada.</p>
                {% endfor %}

            </main>
        </div>
    </section>
</body>
</html>
