{% load static %}
<link rel="stylesheet" href="{% static "css/Botao.css" %}?v=1.2">
<style>
    :root{
        --corBotao: {{corBotao}};
        --strokeBotao: {{strokeBotao}};
        --corFonteBotao: {{corFonteBotao}};
        --cinza: #ACABA4;
    }
    .BotaoLink{
        background-color: var(--corBotao);
        border: 2px solid;
        border-color: var(--strokeBotao);
    }
    .botaoP{
        color: var(--corFonteBotao);
    }
</style>

<a class="BotaoLink" href="{{linkBotao}}" >
<img class="botaoImg"src="{{iconeBotao}}" alt="">
<p class="botaoP">{{labelBotao}}</p></a>
