{% load static %}
<link rel="stylesheet" href="{% static "css/headerDeslogado.css" %}">

<header>
    <div class="logo">
        <img src="{% static 'img/abelha_bizzu.svg' %}" id="abelhalogo" href="/">
        <img src="{% static 'img/logotipo_bizzu.svg' %}" id="nomelogo" href="">
    </div>
        <!-- Barra de pesquisa -->
        <!-- <div class="search-container">
            <input type="search" id="buscar" placeholder="Procurar..." onkeyup="buscar()">
            <div id="popup" class="popup"></div>
        </div> -->
    <button id="btn-abrir-modal"><img src="{% static 'img/entrar.svg' %}" id="entrarbtn">Entrar</button>
</header>

<!-- Modal de Login -->
<dialog id="popup-login">
    <button class="fechar-popup"><img src="{% static 'img/botaofechar.png' %}" alt="Fechar"></button>
    <h1>Log In</h1>
    <p>Ao continuar, você concorda com nosso <a href="#">Contrato de Usuário</a> e nossa <a href="#">Política de Privacidade</a>.</p>
    <hr>
    <div class="form-group">
        <label for="email">Nome de usuário <span class="required">*</span></label>
        <input id="email" type="text" placeholder="Ex: jubileu123">
    </div>
    <div class="form-group">
        <label for="senha">Senha <span class="required">*</span></label>
        <input id="senha" type="password" placeholder="Sua senha deve conter letras e números">
    </div>
    <a href="#" class="forgot-password">Esqueceu a senha?</a>
    <button class="concluir-login">Entrar<img src="{% static 'img/entrar.svg' %}"></button>
    <h3>Primeira vez no Bizzu? <a href="{% url 'cadastro' %}">Cadastre-se</a></h3>
</dialog>

<!-- JavaScript para abrir/fechar modal -->
<script src="{% static 'js/modalLogin.js' %}">
    function buscar() {
        let query = document.getElementById('buscar').value;
        let popup = document.getElementById('popup');

        if (query.length > 0) {
            fetch(`/pesquisa/?q=${query}`)
            .then(response => response.json())
            .then(data => {
                popup.innerHTML = "";

                // let rect = inputBox.getBoundingClientRect();
                //     popup.style.top = rect.bottom + "px";
                //     popup.style.left = rect.left + "px";
                //     popup.style.width = rect.width + "px";

                if (data.usuarios.length > 0 || data.postagens.length > 0) {
                    popup.style.display = "block";

                    // Exibir usuários encontrados
                    data.usuarios.forEach(usuario => {
                        let div = document.createElement('div');
                        div.innerHTML = `
                            <a href="${usuario.username}/" class="popup-item">
                                <img src="${usuario.imagemPerfil ? usuario.imagemPerfil : '../static/img/default-profile.png'}" alt="Foto de ${usuario.nome}">
                                <div>
                                    <strong>${usuario.nome}</strong>
                                    <p>${usuario.descricao}</p>
                                </div>
                            </a>
                        `;
                        popup.appendChild(div);
                    });

                    // Exibir postagens encontradas
                    data.postagens.forEach(post => {
                        let div = document.createElement('div');
                        div.innerHTML = `
                            <div class="popup-post">
                                <strong>${post.usuario__nome}:</strong> ${post.texto}
                            </div>
                        `;
                        popup.appendChild(div);
                    });

                } else {
                    popup.style.display = "none";
                }
            });
        } else {
            popup.style.display = "none";
        }
    }

    // Ocultar pop-up quando clicar fora
    document.addEventListener("click", function(event) {
        let popup = document.getElementById("popup");
        let inputBox = document.getElementById("buscar");
        if (!popup.contains(event.target) && !inputBox.contains(event.target)) {
            popup.style.display = "none";
        }
    });
</script>

<style>
.popup {
    position: absolute;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
    display: none; /* Mantém oculto até que seja necessário */
    max-height: 250px;
    overflow-y: auto;
    z-index: 1000;
    width: auto;
    min-width: 250px; /* Garante que tenha um tamanho mínimo */
    padding: 5px 0; /* Adiciona um espaço interno para não ficar colado */
}

.popup-item {
    display: flex;
    align-items: center;
    padding: 10px;
    text-decoration: none;
    color: black;
    border-bottom: 1px solid #eee;
    transition: background 0.2s;
}

.popup-item:hover {
    background: #f1f1f1;
}

.popup-item img {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    margin-right: 10px;
}

.popup-item div {
    display: flex;
    flex-direction: column;
}

.popup-item p {
    font-size: 12px;
    color: #777;
    margin: 0;
}

</style>
